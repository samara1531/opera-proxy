name: Push-Multi-Target Build Opera-Proxy

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: "OpenWrt version"
        required: true
        default: "25.12.1"
      compile_go:
        description: "Compile Go implementation"
        required: true
        type: boolean
        default: false

jobs:
  generate-matrix:
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install Node.js dependencies
        run: |
          echo "Cleaning npm cache..."
          npm cache clean --force
          npm install

      - name: Generate build matrix
        id: set-matrix
        run: |
          MATRIX=$(node .github/scripts/gen-matrix.js "${{ github.event.inputs.openwrt_version }}")
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  build-opera-proxy:
    needs: generate-matrix
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v5
        with:
          path: opera-proxy

      - name: Checkout OpenWRT Packages repository
        uses: actions/checkout@v5
        with:
          path: packages
          repository: openwrt/packages
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pyelftools python3-dev python3-setuptools swig curl zip zstd jq unzip build-essential libelf-dev

      - name: Download and prepare SDK
        env:
          compile_go: ${{ inputs.compile_go }}
        run: |
          set -e -x
          VERSION="${{ github.event.inputs.openwrt_version }}"
          TARGET="${{ matrix.target }}"
          SUBTARGET="${{ matrix.subtarget }}"

          if [ "$VERSION" = "SNAPSHOT" ]; then
              MIRRORS=("https://downloads.openwrt.org/snapshots/targets/$TARGET/$SUBTARGET")
          else
              MIRRORS=(
                  "https://downloads.openwrt.org/releases/$VERSION/targets/$TARGET/$SUBTARGET"
                  "https://mirror-03.infra.openwrt.org/releases/$VERSION/targets/$TARGET/$SUBTARGET"
                  "https://mirror-01.infra.openwrt.org/releases/$VERSION/targets/$TARGET/$SUBTARGET"
                  "https://mirror-02.infra.openwrt.org/releases/$VERSION/targets/$TARGET/$SUBTARGET"
                  "https://mirror-04.infra.openwrt.org/releases/$VERSION/targets/$TARGET/$SUBTARGET"
              )
          fi

          sdk_url=""
          for BASE_URL in "${MIRRORS[@]}"; do
              sdk_url=$(curl -fsSL "$BASE_URL" | grep -oP 'openwrt-sdk[^<"]+\.(tar\.zst|tar\.xz)' | head -n1)
              if [[ -n "$sdk_url" ]]; then
                  echo "SDK found at $BASE_URL/$sdk_url"
                  break
              fi
          done

          if [[ -z "$sdk_url" ]]; then
              echo "⚠️ SDK file not found on any mirror"
              exit 1
          fi

          curl -fsLO --location "$BASE_URL/$sdk_url"
          file_name=$(basename "$sdk_url")
          tar -xf "$file_name"
          rm -f *.tar.zst *.tar.xz
          mv openwrt-sdk* openwrt

          echo "src-cpy opera-proxy ../opera-proxy" >> openwrt/feeds.conf.default

          git config --global http.version HTTP/1.1
          git config --global http.postBuffer 524288000
          git config --global core.compression 0

          ./openwrt/scripts/feeds update -a
          ./openwrt/scripts/feeds install -a
          make -C openwrt defconfig

      - name: Compile Opera-Proxy
        env:
          compile_go: ${{ inputs.compile_go }}
        continue-on-error: true
        run: |
          cd openwrt
          set +e
          make package/opera-proxy/{clean,download,prepare,compile} -j$(nproc)
          STATUS=$?
          if [ "$compile_go" = "true" ]; then
            make package/opera-proxy-go/{clean,download,prepare,compile} -j$(nproc) || echo "opera-proxy-go failed — continuing"
          fi
          if [ $STATUS -ne 0 ]; then
            echo "⚠️ Build failed"
            exit 1
          fi
          echo "✅ Build successful"

      - name: Upload release assets
        run: |
          mkdir -p artifacts
          find "openwrt/bin/targets/${{ matrix.target }}/${{ matrix.subtarget }}/packages" \
            -type f -name 'opera-proxy*' -exec cp {} artifacts/ \; 2>/dev/null || true
          find "openwrt/bin/packages" \
            -type f -name 'opera-proxy*' -exec cp {} artifacts/ \; 2>/dev/null || true

          ZIP_NAME="OpenWRT-opera-proxy-${{ github.event.inputs.openwrt_version }}-${{ matrix.target }}-${{ matrix.subtarget }}.zip"

          if [ "$(ls -A artifacts)" ]; then
            zip -r "$ZIP_NAME" artifacts
            gh release create "${{ github.event.inputs.openwrt_version }}" \
              --title "OpenWRT Opera-Proxy ${{ github.event.inputs.openwrt_version }}" \
              --notes "opera-proxy packages" \
              --repo "${{ github.repository }}" || echo "Release already exists"
            gh release upload "${{ github.event.inputs.openwrt_version }}" "$ZIP_NAME" \
              --clobber \
              --repo "${{ github.repository }}"
          else
            echo "⚠️ Packages not found, ZIP not created"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
