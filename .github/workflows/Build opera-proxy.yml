name: Multi Build opera-proxy

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: "OpenWrt version (SNAPSHOT или 25.12.1, 24.10.6 и т.д.)"
        required: true
        default: "25.12.1"
      opera_proxy_ref:
        description: "Branch / tag / commit"
        required: true
        default: "master"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-matrix:
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install axios cheerio

      - name: Generate build matrix
        id: set-matrix
        run: |
          VERSION="${{ inputs.openwrt_version }}"
          MATRIX=$(node index.js "$VERSION" 2>&1 || echo '{"include":[]}')
          
          echo "Matrix size: $(echo -n "$MATRIX" | wc -c) bytes"
          echo "$MATRIX" | jq . || echo "JSON preview skipped (too big)"
          
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  build-opera-proxy:
    name: ${{ matrix.target }}/${{ matrix.subtarget }} (${{ matrix.pkgarch }})
    needs: generate-matrix
    if: ${{ needs.generate-matrix.outputs.matrix != '{"include":[]}' }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}

    steps:
      - name: Checkout opera-proxy
        uses: actions/checkout@v4
        with:
          path: opera-proxy
          ref: ${{ inputs.opera_proxy_ref }}

      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y build-essential git python3 rsync gawk unzip libncurses-dev wget file zstd bc time

      - name: Detect package extension (apk/ipk)
        id: pkg
        run: |
          VER="${{ inputs.openwrt_version }}"
          if [[ "$VER" == "SNAPSHOT" || "$VER" > "25.11" ]]; then
            echo "ext=apk" >> $GITHUB_OUTPUT
          else
            echo "ext=ipk" >> $GITHUB_OUTPUT
          fi

      - name: Download SDK
        run: |
          set -e -x
          TARGET="${{ matrix.target }}"
          SUB="${{ matrix.subtarget }}"
          VER="${{ inputs.openwrt_version }}"
          
          if [ "$VER" = "SNAPSHOT" ]; then
            BASE="https://downloads.openwrt.org/snapshots/targets/${TARGET}/${SUB}/"
          else
            BASE="https://downloads.openwrt.org/releases/${VER}/targets/${TARGET}/${SUB}/"
          fi
          
          SDK=$(curl -s "$BASE" | grep -oP 'href="\Kopenwrt-sdk[^"]+\.(tar\.xz|tar\.zst)' | head -n1)
          curl -fSL -o sdk.tar "${BASE}${SDK}"
          tar -xf sdk.tar
          rm sdk.tar
          mv openwrt-sdk* openwrt

      - name: Prepare package
        run: |
          mkdir -p openwrt/package/opera-proxy
          cp -r opera-proxy/openwrt-package/* openwrt/package/opera-proxy/ 2>/dev/null || cp opera-proxy/openwrt-package/Makefile openwrt/package/opera-proxy/

      - name: Create source tarball
        run: |
          mkdir -p openwrt/dl temp/opera-proxy-src
          rsync -av --exclude=.git opera-proxy/ temp/opera-proxy-src/
          tar -czf openwrt/dl/opera-proxy-1.15.0.tar.gz -C temp .
          rm -rf temp

      - name: Feeds & config
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          ./scripts/feeds install golang || true
          make defconfig
          echo "CONFIG_PACKAGE_opera-proxy=y" >> .config
          make oldconfig </dev/null
          cd ..

      - name: Compile
        run: |
          cd openwrt
          make package/opera-proxy/compile V=s IGNORE_ERRORS=1
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: opera-proxy-${{ inputs.openwrt_version }}-${{ matrix.pkgarch }}
          path: |
            openwrt/bin/packages/*/${{ matrix.pkgarch }}/opera-proxy*.${{ steps.pkg.outputs.ext }}
            openwrt/bin/packages/*/*/opera-proxy*.${{ steps.pkg.outputs.ext }}
          if-no-files-found: warn
