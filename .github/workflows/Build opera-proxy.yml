name: Build Multi Binaries

on:
  push:
    tags:
      - 'v*.*.*'   # срабатывает на семантические теги, например v1.15.0

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [linux, windows]
        arch: [amd64, arm64, arm, 386, mipsle]
        exclude:
          - os: windows
            arch: arm
          - os: windows
            arch: mipsle
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: 'stable'

      - name: Read tag
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Install UPX (for compression)
        if: matrix.os == 'linux'
        run: sudo apt-get update && sudo apt-get install -y upx-ucl

      - name: Build binary
        run: |
          echo "Building for ${{ matrix.os }}/ ${{ matrix.arch }}"
          EXT=""
          if [ "${{ matrix.os }}" = "windows" ]; then EXT=".exe"; fi
          OUTPUT=bin/opera-proxy-${{ matrix.os }}-${{ matrix.arch }}$EXT
          mkdir -p bin

          # Для ARMv7 (32-bit)
          if [ "${{ matrix.arch }}" = "arm" ]; then
            export GOARM=7
          fi

          # Сборка
          if [ "${{ matrix.os }}" = "windows" ]; then
            CGO_ENABLED=0 GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} \
            go build -a -tags netgo -trimpath \
            -ldflags="-s -w" \
            -o $OUTPUT ./
          else
            CGO_ENABLED=0 GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} \
            go build -a -tags netgo -trimpath \
            -ldflags="-s -w -extldflags '-static'" \
            -o $OUTPUT ./
          fi

          # Сжатие Linux бинарника через UPX
          if [ "${{ matrix.os }}" = "linux" ]; then
            upx --best $OUTPUT || echo "UPX failed, continue"
          fi

          ls -lh bin/

      - name: Release
        uses: softprops/action-gh-release@v4
        with:
          files: bin/*
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
