name: Build opera-proxy for all OpenWrt targets

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: "OpenWrt version (e.g., 23.05.5, 25.12.1, SNAPSHOT)"
        required: true
        default: "25.12.1"
      opera_proxy_ref:
        description: "opera‑proxy branch/tag/commit"
        required: true
        default: "master"

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.opera_proxy_ref }}
        path: opera-proxy

    - name: Install deps
      run: |
        sudo apt update
        sudo apt install -y build-essential git python3 rsync gawk unzip libncurses-dev wget file zstd curl jq

    - name: Determine package format
      id: pkg
      run: |
        VERSION="${{ github.event.inputs.openwrt_version }}"
        if [ "$VERSION" = "SNAPSHOT" ] || echo "$VERSION" | grep -q '^25\.12\.' ; then
          echo "ext=apk" >> $GITHUB_OUTPUT
        else
          echo "ext=ipk" >> $GITHUB_OUTPUT
        fi

    - name: List targets and subtargets
      run: |
        VERSION="${{ github.event.inputs.openwrt_version }}"
        BASE="https://downloads.openwrt.org/releases/${VERSION}/targets/"
        
        mkdir -p targets
        curl -s "$BASE" \
          | grep -oP 'href="\K[^"/]+(?=/")' > targets/targets.txt
        
        echo "Targets found:"
        cat targets/targets.txt
        
        mkdir -p subtargets
        while read T; do
          curl -s "${BASE}${T}/" \
            | grep -oP 'href="\K[^"/]+(?=/")' > subtargets/${T}.txt
        done < targets/targets.txt

    - name: Build all targets
      run: |
        VERSION="${{ github.event.inputs.openwrt_version }}"
        EXT="${{ steps.pkg.outputs.ext }}"

        while read TARGET; do
          while read SUB; do
            echo "=== Building for $TARGET / $SUB ==="

            BASE_URL="https://downloads.openwrt.org/releases/${VERSION}/targets/${TARGET}/${SUB}/"
            SDK_NAME=$(curl -s "${BASE_URL}" \
              | grep -oP 'openwrt-sdk[^"]+\.(tar\.xz|tar\.zst)' \
              | head -n1)

            if [ -z "$SDK_NAME" ]; then
              echo "No SDK found, skipping $TARGET/$SUB"
              continue
            fi

            echo "Found SDK: $SDK_NAME"
            wget -q "${BASE_URL}${SDK_NAME}"

            tar_opts="xf"
            if echo "$SDK_NAME" | grep -q '\.zst$'; then
              tar_opts="--use-compress-program=unzstd -xf"
            fi

            tar $tar_opts "$SDK_NAME"
            mv openwrt-sdk* openwrt

            mkdir -p openwrt/package/opera-proxy
            cp opera-proxy/openwrt-package/Makefile openwrt/package/opera-proxy/

            mkdir -p openwrt/dl
            mkdir -p temp/opera-proxy-1.15.0
            rsync -a --exclude=.git opera-proxy/ temp/opera-proxy-1.15.0/
            tar -czf openwrt/dl/opera-proxy-1.15.0.tar.gz -C temp .
            rm -rf temp

            cd openwrt
            ./scripts/feeds update -a
            ./scripts/feeds install golang

            make defconfig
            echo "CONFIG_PACKAGE_opera-proxy=y" >> .config
            make oldconfig

            make package/opera-proxy/compile -j$(nproc) V=s
            cd ..

            mkdir -p artifacts/$TARGET/$SUB
            cp openwrt/bin/packages/**/opera-proxy*.$EXT artifacts/$TARGET/$SUB/ 2>/dev/null || true

            rm -rf openwrt "$SDK_NAME"
          done < subtargets/${TARGET}.txt
        done < targets/targets.txt

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: opera-proxy-packages
        path: artifacts/
