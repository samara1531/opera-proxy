name: Build opera-proxy (all archs)

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: "OpenWrt version"
        required: true
        default: "25.12.1"
      opera_proxy_ref:
        description: "opera-proxy branch/tag/commit"
        required: true
        default: "master"

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        arch: []

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.opera_proxy_ref }}
          path: opera-proxy

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git python3 rsync gawk unzip libncurses-dev wget file zstd curl nodejs npm

      - name: Get architectures
        id: archs
        run: |
          VERSION="${{ github.event.inputs.openwrt_version }}"
          URL="https://downloads.openwrt.org/releases/${VERSION}/packages/"
          ARCHS=$(curl -s "$URL" | grep -oP 'href="\K[^"/]+(?=/")')
          echo "ARCHS=$ARCHS"
          echo "matrix=$(printf '%s\n' $ARCHS | jq -R . | jq -s '{include: map({pkgarch:.})}')" >> $GITHUB_OUTPUT

      - name: Set matrix
        run: echo "Matrix ready" # GitHub automatically uses ${{ steps.archs.outputs.matrix }}

      - name: Build packages
        run: |
          VERSION="${{ github.event.inputs.openwrt_version }}"
          for ARCH in $ARCHS; do
            echo "Build for $ARCH"

            # Определяем формат пакета
            if [[ "$VERSION" =~ ^25\.12\. ]] ; then
              EXT=apk
            else
              EXT=ipk
            fi

            # SDK URL
            BASE_URL="https://downloads.openwrt.org/releases/$VERSION/targets/*/*/"
            SDK_URL=$(curl -s $BASE_URL | grep -oP 'openwrt-sdk[^"]+\.tar\.(zst|xz)' | head -n1)
            wget -q ${BASE_URL}${SDK_URL}
            tar -xf $SDK_URL
            mv openwrt-sdk* openwrt

            # Сборка
            mkdir -p openwrt/package/opera-proxy
            cp opera-proxy/openwrt-package/Makefile openwrt/package/opera-proxy/

            mkdir -p openwrt/dl
            mkdir -p temp/opera-proxy-1.15.0
            rsync -a --exclude=.git opera-proxy/ temp/opera-proxy-1.15.0/
            tar -czf openwrt/dl/opera-proxy-1.15.0.tar.gz -C temp .
            rm -rf temp

            cd openwrt
            ./scripts/feeds update -a
            ./scripts/feeds install golang
            make defconfig
            echo "CONFIG_PACKAGE_opera-proxy=y" >> .config
            make oldconfig
            make package/opera-proxy/compile -j$(nproc) V=s
            cd ..

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: opera-proxy-${{ matrix.pkgarch }}
          path: |
            openwrt/bin/packages/**/opera-proxy*.ipk
            openwrt/bin/packages/**/opera-proxy*.apk
          if-no-files-found: error
