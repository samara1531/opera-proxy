name: Build opera-proxy for all OpenWrt architectures

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: "OpenWrt version (например 23.05.5, 25.12.1 или SNAPSHOT)"
        required: true
        default: "25.12.1"
      opera_proxy_ref:
        description: "opera-proxy branch/tag/commit"
        required: true
        default: "master"

jobs:
  build-all:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.opera_proxy_ref }}
          path: opera-proxy

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git python3 rsync gawk unzip libncurses-dev wget file zstd curl nodejs npm jq

      - name: Fetch architectures
        run: |
          VERSION="${{ github.event.inputs.openwrt_version }}"
          URL="https://downloads.openwrt.org/releases/${VERSION}/packages/"
          echo "Fetching architectures from $URL"

          # Получаем все папки (архитектуры) и сохраняем в файл
          curl -s "$URL" | grep -oP 'href="\K[^"/]+(?=/")' > archs.txt

          echo "Found architectures:"
          cat archs.txt

      - name: Build opera-proxy for each architecture
        run: |
          VERSION="${{ github.event.inputs.openwrt_version }}"

          # Определяем формат пакета
          if [[ "$VERSION" == "SNAPSHOT" || "$VERSION" =~ ^25\.12\. ]]; then
            EXT=apk
          else
            EXT=ipk
          fi
          echo "Package format: $EXT"

          ARCHS=$(cat archs.txt)

          for ARCH in $ARCHS; do
            echo "================ Build for $ARCH ================"

            # SDK (берём первый доступный SDK, универсально для всех архитектур)
            BASE_URL="https://downloads.openwrt.org/releases/${VERSION}/targets/*/*/"
            SDK_NAME=$(curl -s $BASE_URL | grep -oP 'openwrt-sdk[^"]+\.tar\.(zst|xz)' | head -n1)
            if [ -z "$SDK_NAME" ]; then
              echo "SDK not found, skipping $ARCH"
              continue
            fi

            wget -q "${BASE_URL}${SDK_NAME}"
            tar -xf "$SDK_NAME"
            mv openwrt-sdk* openwrt

            # Копируем Makefile пакета
            mkdir -p openwrt/package/opera-proxy
            cp opera-proxy/openwrt-package/Makefile openwrt/package/opera-proxy/

            # Создаём исходный tarball
            mkdir -p openwrt/dl
            mkdir -p temp/opera-proxy-1.15.0
            rsync -a --exclude=.git opera-proxy/ temp/opera-proxy-1.15.0/
            tar -czf openwrt/dl/opera-proxy-1.15.0.tar.gz -C temp .
            rm -rf temp

            # Сборка
            cd openwrt
            ./scripts/feeds update -a
            ./scripts/feeds install golang

            make defconfig
            echo "CONFIG_PACKAGE_opera-proxy=y" >> .config
            make oldconfig

            make package/opera-proxy/compile -j$(nproc) V=s
            cd ..

            # Сохраняем артефакт
            mkdir -p artifacts/$ARCH
            cp openwrt/bin/packages/**/opera-proxy*.$EXT artifacts/$ARCH/ 2>/dev/null || true
          done

      - name: Upload all artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opera-proxy-packages
          path: artifacts/
          if-no-files-found: error
