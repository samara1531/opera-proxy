name: Build opera-proxy (multi-arch)

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: "OpenWrt version (23.x / 24.x / 25.12.x / SNAPSHOT)"
        required: true
        default: "25.12.1"
      opera_proxy_ref:
        description: "opera-proxy ref"
        required: true
        default: "master"

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.out.outputs.matrix }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4

      - name: Install deps
        run: npm install axios cheerio

      # 🔥 генерим JS прямо в раннере (никаких missing file)
      - id: out
        run: |
          cat << 'EOF' > gen-matrix.js
          const axios = require('axios');
          const cheerio = require('cheerio');

          const version = process.argv[2];
          const isSnapshot = version === 'SNAPSHOT';

          const baseUrl = isSnapshot
            ? `https://downloads.openwrt.org/snapshots/targets/`
            : `https://downloads.openwrt.org/releases/${version}/targets/`;

          async function fetchHTML(url) {
            const { data } = await axios.get(url);
            return cheerio.load(data);
          }

          async function fetchJSON(url) {
            const { data } = await axios.get(url);
            return data;
          }

          async function getTargets() {
            const $ = await fetchHTML(baseUrl);
            return $('a').map((i, el) => $(el).attr('href'))
              .get().filter(h => h && h.endsWith('/'))
              .map(h => h.slice(0, -1));
          }

          async function getSubtargets(target) {
            const $ = await fetchHTML(baseUrl + target + '/');
            return $('a').map((i, el) => $(el).attr('href'))
              .get().filter(h => h && h.endsWith('/'))
              .map(h => h.slice(0, -1));
          }

          async function getPkgarch(target, sub) {
            try {
              const j = await fetchJSON(baseUrl + target + '/' + sub + '/packages/index.json');
              return j.architecture;
            } catch {}
            return null;
          }

          (async () => {
            const targets = await getTargets();
            const map = new Map();

            for (const t of targets) {
              const subs = await getSubtargets(t);
              for (const s of subs) {
                const arch = await getPkgarch(t, s);
                if (arch && !map.has(arch)) {
                  map.set(arch, { target: t, subtarget: s, pkgarch: arch });
                }
              }
            }

            console.log(JSON.stringify({ include: Array.from(map.values()) }));
          })();
          EOF

          node gen-matrix.js ${{ github.event.inputs.openwrt_version }} > matrix.json
          echo "matrix=$(cat matrix.json)" >> $GITHUB_OUTPUT

  build:
    needs: generate-matrix
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}

    steps:
      - name: Checkout opera-proxy
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.opera_proxy_ref }}
          path: opera-proxy

      - name: Detect package format
        id: pkg
        run: |
          VER="${{ github.event.inputs.openwrt_version }}"

          if [[ "$VER" == "SNAPSHOT" || "$VER" =~ ^25\.12\. ]]; then
            echo "ext=apk" >> $GITHUB_OUTPUT
          else
            echo "ext=ipk" >> $GITHUB_OUTPUT
          fi

          echo "Format: $(grep ext $GITHUB_OUTPUT)"

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y build-essential git python3 rsync gawk unzip libncurses-dev wget file zstd curl

      - name: Download SDK
        run: |
          if [ "${{ github.event.inputs.openwrt_version }}" = "SNAPSHOT" ]; then
            BASE_URL="https://downloads.openwrt.org/snapshots/targets/${{ matrix.target }}/${{ matrix.subtarget }}/"
          else
            BASE_URL="https://downloads.openwrt.org/releases/${{ github.event.inputs.openwrt_version }}/targets/${{ matrix.target }}/${{ matrix.subtarget }}/"
          fi

          echo "Using $BASE_URL"

          SDK=$(curl -s $BASE_URL | grep -oP 'openwrt-sdk[^"]+\.tar\.(zst|xz)' | head -n1)

          if [ -z "$SDK" ]; then
            echo "No SDK, skipping"
            exit 0
          fi

          wget -q ${BASE_URL}${SDK}
          tar -xf $SDK
          mv openwrt-sdk* openwrt

      - name: Add package
        run: |
          mkdir -p openwrt/package/opera-proxy
          cp opera-proxy/openwrt-package/Makefile openwrt/package/opera-proxy/

      - name: Prepare source
        run: |
          mkdir -p openwrt/dl
          mkdir -p temp/opera-proxy-1.15.0
          rsync -a --exclude=.git opera-proxy/ temp/opera-proxy-1.15.0/
          tar -czf openwrt/dl/opera-proxy-1.15.0.tar.gz -C temp .
          rm -rf temp

      - name: Feeds + config
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install golang

          make defconfig
          echo "CONFIG_PACKAGE_opera-proxy=y" >> .config
          make oldconfig

      - name: Compile
        run: |
          cd openwrt
          make package/opera-proxy/compile -j$(nproc) V=s

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: opera-proxy-${{ matrix.pkgarch }}
          path: |
            openwrt/bin/packages/**/opera-proxy*.${{ steps.pkg.outputs.ext }}
            openwrt/bin/packages/**/opera-proxy*.ipk
            openwrt/bin/packages/**/opera-proxy*.apk
          if-no-files-found: error
