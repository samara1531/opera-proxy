name: Build opera-proxy (all archs)

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: "OpenWrt version (например 23.05.5 или 25.12.1 или SNAPSHOT)"
        required: true
        default: "25.12.1"
      opera_proxy_ref:
        description: "opera-proxy branch/tag/commit"
        required: true
        default: "master"

jobs:
  build-all-archs:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.opera_proxy_ref }}
          path: opera-proxy

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git python3 rsync gawk unzip libncurses-dev wget file zstd curl nodejs npm jq

      - name: Get architectures
        id: archs
        run: |
          VERSION="${{ github.event.inputs.openwrt_version }}"
          URL="https://downloads.openwrt.org/releases/${VERSION}/packages/"
          echo "Fetching architectures from $URL"

          ARCHS=$(curl -s "$URL" | grep -oP 'href="\K[^"/]+(?=/")')
          echo "Found architectures: $ARCHS"

          # Сохраняем для последующего цикла
          echo "$ARCHS" > arch-list.txt
          echo "ARCH_LIST=$(cat arch-list.txt)" >> $GITHUB_OUTPUT

      - name: Build opera-proxy for all architectures
        run: |
          VERSION="${{ github.event.inputs.openwrt_version }}"
          ARCHS=$(cat arch-list.txt)

          for ARCH in $ARCHS; do
            echo "================ Build for $ARCH ================"

            # Определяем формат пакета
            if [[ "$VERSION" == "SNAPSHOT" || "$VERSION" =~ ^25\.12\. ]]; then
              EXT=apk
            else
              EXT=ipk
            fi
            echo "Package format: $EXT"

            # Находим SDK
            BASE_URL="https://downloads.openwrt.org/releases/${VERSION}/targets/*/*/"
            SDK_URL=$(curl -s $BASE_URL | grep -oP 'openwrt-sdk[^"]+\.tar\.(zst|xz)' | head -n1)

            if [ -z "$SDK_URL" ]; then
              echo "SDK not found for $ARCH, skipping..."
              continue
            fi

            wget -q "${BASE_URL}${SDK_URL}"
            tar -xf "$SDK_URL"
            mv openwrt-sdk* openwrt

            # Копируем Makefile пакета
            mkdir -p openwrt/package/opera-proxy
            cp opera-proxy/openwrt-package/Makefile openwrt/package/opera-proxy/

            # Создаём исходный tarball
            mkdir -p openwrt/dl
            mkdir -p temp/opera-proxy-1.15.0
            rsync -a --exclude=.git opera-proxy/ temp/opera-proxy-1.15.0/
            tar -czf openwrt/dl/opera-proxy-1.15.0.tar.gz -C temp .
            rm -rf temp

            # Сборка
            cd openwrt
            ./scripts/feeds update -a
            ./scripts/feeds install golang

            make defconfig
            echo "CONFIG_PACKAGE_opera-proxy=y" >> .config
            make oldconfig

            make package/opera-proxy/compile -j$(nproc) V=s
            cd ..

            # Upload артефакт
            echo "Uploading package for $ARCH"
            gh release upload "opera-proxy-${VERSION}" openwrt/bin/packages/**/opera-proxy*.$EXT --clobber || true
          done
