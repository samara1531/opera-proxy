name: Build Opera-Proxy for All OpenWrt Targets

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: "OpenWrt version (например, 25.12.1 или SNAPSHOT)"
        required: true
        default: "25.12.1"
      opera_proxy_ref:
        description: "opera-proxy branch/tag/commit"
        required: true
        default: "master"

jobs:
  generate-matrix:
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Generate OpenWrt target matrix
        id: set-matrix
        run: |
          VERSION="${{ github.event.inputs.openwrt_version }}"

          if [ "$VERSION" = "SNAPSHOT" ]; then
            BASE_URL="https://downloads.openwrt.org/snapshots/targets"
          else
            BASE_URL="https://downloads.openwrt.org/releases/$VERSION/targets"
          fi

          # получаем список таргетов
          TARGETS=$(curl -s "$BASE_URL/" | grep -oP 'href="\K[^"/]+(?=/")')
          MATRIX="[]"

          for TARGET in $TARGETS; do
            # получаем список subtarget для каждого таргета
            SUBTARGETS=$(curl -s "$BASE_URL/$TARGET/" | grep -oP 'href="\K[^"/]+(?=/")')
            for SUB in $SUBTARGETS; do
              MATRIX=$(echo $MATRIX | jq ". + [{\"target\":\"$TARGET\",\"subtarget\":\"$SUB\"}]")
            done
          done

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "Matrix generated with $(echo $MATRIX | jq length) items"

  build-opera-proxy:
    needs: generate-matrix
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      - name: Checkout opera-proxy repository
        uses: actions/checkout@v5
        with:
          path: opera-proxy
          ref: ${{ github.event.inputs.opera_proxy_ref }}
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git python3 rsync gawk unzip libncurses-dev wget file zstd curl jq

      - name: Download and extract SDK
        run: |
          set -e -x
          TARGET="${{ matrix.target }}"
          SUBTARGET="${{ matrix.subtarget }}"
          VERSION="${{ github.event.inputs.openwrt_version }}"

          if [ "$VERSION" = "SNAPSHOT" ]; then
            BASE_URL="https://downloads.openwrt.org/snapshots/targets/$TARGET/$SUBTARGET/"
          else
            BASE_URL="https://downloads.openwrt.org/releases/$VERSION/targets/$TARGET/$SUBTARGET/"
          fi

          SDK_URL=$(curl -s "$BASE_URL" | grep -oP 'href="openwrt-sdk[^"]+\.(tar\.zst|tar\.xz)"' | sed -e 's/href="//' -e 's/"$//' | head -n1)
          if [ -z "$SDK_URL" ]; then
            echo "SDK not found for $TARGET/$SUBTARGET"
            exit 1
          fi

          curl -fsLO "${BASE_URL}${SDK_URL}"
          tar -xf "$(basename "$SDK_URL")"
          rm -f *.tar.zst *.tar.xz
          mv openwrt-sdk* openwrt

      - name: Copy Makefile to SDK
        run: |
          mkdir -p openwrt/package/opera-proxy
          cp opera-proxy/openwrt-package/Makefile openwrt/package/opera-proxy/

      - name: Create source tarball
        run: |
          mkdir -p openwrt/dl
          mkdir -p temp/opera-proxy-src
          rsync -av --exclude=.git opera-proxy/ temp/opera-proxy-src/
          tar -czf openwrt/dl/opera-proxy-1.0.0.tar.gz -C temp opera-proxy-src
          rm -rf temp

      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          cd ..

      - name: Prepare config
        run: |
          cd openwrt
          make defconfig
          echo "CONFIG_PACKAGE_opera-proxy=y" >> .config
          make oldconfig
          cd ..

      - name: Compile opera-proxy
        run: |
          cd openwrt
          make package/opera-proxy/compile V=s
          cd ..

      - name: Upload compiled package
        uses: actions/upload-artifact@v4
        with:
          name: opera-proxy-${{ github.event.inputs.openwrt_version }}-${{ matrix.target }}-${{ matrix.subtarget }}
          path: openwrt/bin/packages/**/opera-proxy*.apk
          if-no-files-found: error
