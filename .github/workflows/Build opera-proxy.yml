name: Build opera-proxy for all OpenWrt targets

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: "OpenWrt version (например 23.05.5, 25.12.1 или SNAPSHOT)"
        required: true
        default: "25.12.1"
      opera_proxy_ref:
        description: "opera-proxy branch/tag/commit"
        required: true
        default: "master"

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.opera_proxy_ref }}
          path: opera-proxy

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git python3 rsync gawk unzip libncurses-dev wget file zstd curl jq

      - name: Determine package format
        id: pkg
        run: |
          VERSION="${{ github.event.inputs.openwrt_version }}"
          if [ "$VERSION" = "SNAPSHOT" ] || echo "$VERSION" | grep -q '^25\.12\.' ; then
            echo "ext=apk" >> $GITHUB_OUTPUT
          else
            echo "ext=ipk" >> $GITHUB_OUTPUT
          fi

      - name: Fetch all targets and subtargets
        id: targets
        run: |
          VERSION="${{ github.event.inputs.openwrt_version }}"
          BASE_URL="https://downloads.openwrt.org/releases/${VERSION}/targets/"

          echo "Fetching targets from $BASE_URL"
          curl -s "$BASE_URL" | grep -oP 'href="\K[^"/]+(?=/")' > targets.txt

          echo "Targets found:"
          cat targets.txt

          mkdir -p subtargets
          while read TARGET; do
            curl -s "${BASE_URL}${TARGET}/" | grep -oP 'href="\K[^"/]+(?=/")' > "subtargets/${TARGET}.txt"
          done < targets.txt

      - name: Build opera-proxy for each target/subtarget
        run: |
          VERSION="${{ github.event.inputs.openwrt_version }}"
          EXT="${{ steps.pkg.outputs.ext }}"

          while read TARGET; do
            while read SUBTARGET; do
              echo "================ Build for $TARGET / $SUBTARGET ================"

              # Скачиваем SDK
              SDK_URL="https://downloads.openwrt.org/releases/${VERSION}/targets/${TARGET}/${SUBTARGET}/openwrt-sdk-${VERSION}-${TARGET}-${SUBTARGET}_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
              if ! wget -q --spider "$SDK_URL"; then
                echo "SDK not found for $TARGET/$SUBTARGET, skipping..."
                continue
              fi

              wget -q "$SDK_URL"
              tar -xf "$(basename $SDK_URL)"
              mv openwrt-sdk* openwrt

              # Копируем Makefile пакета
              mkdir -p openwrt/package/opera-proxy
              cp opera-proxy/openwrt-package/Makefile openwrt/package/opera-proxy/

              # Создаём исходный tarball
              mkdir -p openwrt/dl
              mkdir -p temp/opera-proxy-1.15.0
              rsync -a --exclude=.git opera-proxy/ temp/opera-proxy-1.15.0/
              tar -czf openwrt/dl/opera-proxy-1.15.0.tar.gz -C temp .
              rm -rf temp

              # Сборка
              cd openwrt
              ./scripts/feeds update -a
              ./scripts/feeds install golang

              make defconfig
              echo "CONFIG_PACKAGE_opera-proxy=y" >> .config
              make oldconfig

              make package/opera-proxy/compile -j$(nproc) V=s
              cd ..

              # Сохраняем артефакт
              mkdir -p artifacts/$TARGET/$SUBTARGET
              cp openwrt/bin/packages/**/opera-proxy*.$EXT artifacts/$TARGET/$SUBTARGET/ 2>/dev/null || true

              # Чистим SDK перед следующим таргетом
              rm -rf openwrt
            done < "subtargets/${TARGET}.txt"
          done < targets.txt

      - name: Upload all artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opera-proxy-packages
          path: artifacts/
          if-no-files-found: error
