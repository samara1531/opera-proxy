name: Build Opera-Proxy for All OpenWrt Targets

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: "OpenWrt version (25.12.1 or SNAPSHOT)"
        required: true
        default: "SNAPSHOT"
      opera_proxy_ref:
        description: "opera-proxy branch/tag/commit"
        required: true
        default: "master"

jobs:
  generate-matrix:
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install axios cheerio

      - name: Generate matrix of targets
        id: set-matrix
        run: |
          VERSION="${{ github.event.inputs.openwrt_version }}"
          node <<'EOF' > matrix.json
          const axios = require('axios');
          const cheerio = require('cheerio');
          const VERSION = process.argv[2];

          const baseURL = VERSION === "SNAPSHOT" 
            ? "https://downloads.openwrt.org/snapshots/targets/"
            : `https://downloads.openwrt.org/releases/${VERSION}/targets/`;

          (async () => {
            const targetsPage = await axios.get(baseURL);
            const $ = cheerio.load(targetsPage.data);
            const targets = [];
            $('a').each((i, el) => {
              const target = $(el).attr('href');
              if(target && !target.startsWith('?')) {
                targets.push(target.replace(/\/$/, ''));
              }
            });

            const matrix = { include: [] };
            for(const target of targets) {
              const subURL = `${baseURL}${target}/`;
              const subPage = await axios.get(subURL);
              const $$ = cheerio.load(subPage.data);
              $$('a').each((i, el) => {
                const subtarget = $$(el).attr('href');
                if(subtarget && !subtarget.startsWith('?')) {
                  matrix.include.push({
                    target,
                    subtarget: subtarget.replace(/\/$/, '')
                  });
                }
              });
            }

            console.log(JSON.stringify(matrix));
          })();
EOF
          MATRIX=$(node matrix.json "${VERSION}")
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  build-opera-proxy:
    needs: generate-matrix
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      - name: Checkout opera-proxy
        uses: actions/checkout@v5
        with:
          path: opera-proxy
          ref: ${{ github.event.inputs.opera_proxy_ref }}
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git python3 rsync gawk unzip libncurses-dev wget file zstd

      - name: Download and extract SDK
        run: |
          set -e -x
          VERSION="${{ github.event.inputs.openwrt_version }}"
          TARGET="${{ matrix.target }}"
          SUBTARGET="${{ matrix.subtarget }}"

          BASE_URL=$([ "$VERSION" = "SNAPSHOT" ] && echo "https://downloads.openwrt.org/snapshots/targets/$TARGET/$SUBTARGET/" || echo "https://downloads.openwrt.org/releases/$VERSION/targets/$TARGET/$SUBTARGET/")
          SDK_URL=$(curl -s "$BASE_URL" | grep -oP 'href="openwrt-sdk[^"]+\.(tar\.zst|tar\.xz)"' | sed 's/href="//;s/"$//' | head -n1)
          if [ -z "$SDK_URL" ]; then
            echo "SDK file not found for $TARGET/$SUBTARGET."
            exit 1
          fi
          curl -fsLO "${BASE_URL}${SDK_URL}"
          tar -xf "$(basename "$SDK_URL")"
          rm -f *.tar.zst *.tar.xz
          mv openwrt-sdk* openwrt

      - name: Copy Makefile to SDK package
        run: |
          mkdir -p openwrt/package/opera-proxy
          cp opera-proxy/openwrt-package/Makefile openwrt/package/opera-proxy/

      - name: Create source tarball
        run: |
          mkdir -p openwrt/dl
          mkdir -p temp/opera-proxy
          rsync -av --exclude=.git opera-proxy/ temp/opera-proxy/
          tar -czf openwrt/dl/opera-proxy.tar.gz -C temp .
          rm -rf temp

      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          cd ..

      - name: Prepare default config
        run: |
          cd openwrt
          make defconfig
          echo "CONFIG_PACKAGE_opera-proxy=y" >> .config
          make oldconfig
          grep "CONFIG_PACKAGE_opera-proxy" .config || (echo "Package not enabled!" && exit 1)
          cd ..

      - name: Compile opera-proxy
        run: |
          cd openwrt
          make package/opera-proxy/compile V=s
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: opera-proxy-${{ github.event.inputs.openwrt_version }}-${{ matrix.target }}-${{ matrix.subtarget }}
          path: openwrt/bin/packages/**/opera-proxy*.apk
