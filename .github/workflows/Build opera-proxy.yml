name: Multi-Target Build opera-proxy (ipk + apk compatible)

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: "OpenWrt version (SNAPSHOT или 24.10.0, 23.05.5, 25.12.1 и т.д.)"
        required: true
        default: "25.12.1"
      opera_proxy_ref:
        description: "opera-proxy branch/tag/commit"
        required: true
        default: "master"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-matrix:
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository (для index.js)
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps for matrix generator
        run: npm install axios cheerio

      - name: Generate build matrix
        id: set-matrix
        run: |
          VERSION="${{ inputs.openwrt_version }}"
          RAW=$(node index.js "$VERSION" 2>&1 || echo '[]')
          MATRIX=$(jq -c -n --argjson arr "$RAW" '{include: $arr}' || echo '{"include":[]}')
          
          echo "Generated matrix:"
          echo "$MATRIX" | jq .
          
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  build-opera-proxy:
    name: Build ${{ matrix.target }}/${{ matrix.subtarget }} (${{ matrix.pkgarch }})
    needs: generate-matrix
    if: ${{ needs.generate-matrix.outputs.matrix != '{"include":[]}' }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}

    steps:
      - name: Checkout opera-proxy sources
        uses: actions/checkout@v4
        with:
          path: opera-proxy
          ref: ${{ inputs.opera_proxy_ref }}
          fetch-depth: 0

      - name: Install build system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential git python3 rsync gawk unzip \
            libncurses-dev wget file zstd bc time \
            ccache subversion patchutils

      - name: Determine package extension & version type
        id: detect
        run: |
          VER="${{ inputs.openwrt_version }}"
          if [[ "$VER" == "SNAPSHOT" || "$VER" > "25.11" || "$VER" == "25.12"* ]]; then
            echo "pkg_ext=apk" >> $GITHUB_OUTPUT
            echo "is_new_format=true" >> $GITHUB_OUTPUT
          else
            echo "pkg_ext=ipk" >> $GITHUB_OUTPUT
            echo "is_new_format=false" >> $GITHUB_OUTPUT
          fi

      - name: Download and extract OpenWrt SDK
        run: |
          set -e -x

          TARGET="${{ matrix.target }}"
          SUBTARGET="${{ matrix.subtarget }}"
          VER="${{ inputs.openwrt_version }}"

          if [ "$VER" = "SNAPSHOT" ]; then
            BASE="https://downloads.openwrt.org/snapshots/targets/${TARGET}/${SUBTARGET}/"
          else
            BASE="https://downloads.openwrt.org/releases/${VER}/targets/${TARGET}/${SUBTARGET}/"
          fi

          SDK_FILE=$(curl -s --fail "$BASE" \
            | grep -oP 'href="\Kopenwrt-sdk[^"]+\.(tar\.xz|tar\.zst)' \
            | head -n1 || true)

          if [ -z "$SDK_FILE" ]; then
            echo "SDK not found → ${BASE}"
            curl -s "$BASE" | grep -i sdk || true
            exit 1
          fi

          curl --retry 3 --fail -L -o sdk.tar "${BASE}${SDK_FILE}"
          tar -xf sdk.tar
          rm -f sdk.tar
          mv openwrt-sdk* openwrt

      - name: Prepare custom package (opera-proxy)
        run: |
          mkdir -p openwrt/package/opera-proxy
          cp -r opera-proxy/openwrt-package/Makefile openwrt/package/opera-proxy/
          
          # копируем дополнительные файлы, если есть
          [ -d "opera-proxy/openwrt-package/files"   ] && cp -r opera-proxy/openwrt-package/files   openwrt/package/opera-proxy/
          [ -d "opera-proxy/openwrt-package/patches" ] && cp -r opera-proxy/openwrt-package/patches openwrt/package/opera-proxy/

      - name: Create source tarball (версия лучше динамическая)
        run: |
          mkdir -p openwrt/dl temp
          
          # Пример фиксированной версии — в реальности лучше:
          # PKG_VERSION=$(git -C opera-proxy describe --tags --always --dirty 2>/dev/null || echo "1.15.0")
          # tar -czf openwrt/dl/opera-proxy-${PKG_VERSION}.tar.gz ...
          
          rsync -av --exclude='.git' --exclude='openwrt-package' opera-proxy/ temp/opera-proxy-src/
          tar -czf openwrt/dl/opera-proxy-1.15.0.tar.gz -C temp opera-proxy-src
          rm -rf temp

      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          # golang нужен для opera-proxy (предполагаю Go-based)
          ./scripts/feeds install golang || true
          cd ..

      - name: Configure .config
        run: |
          cd openwrt
          make defconfig
          echo "CONFIG_PACKAGE_opera-proxy=y" >> .config
          make oldconfig </dev/null
          grep -q "CONFIG_PACKAGE_opera-proxy=y" .config || { echo "Failed to enable package"; cat .config | grep opera-proxy; exit 1; }
          cd ..

      - name: Compile package
        run: |
          cd openwrt
          make package/opera-proxy/compile V=s IGNORE_ERRORS=1 || true
          cd ..

      - name: Upload artifact (поддержка .apk и .ipk)
        uses: actions/upload-artifact@v4
        with:
          name: opera-proxy-${{ inputs.openwrt_version }}-${{ matrix.pkgarch }}-${{ matrix.target }}-${{ matrix.subtarget }}
          path: |
            openwrt/bin/packages/*/${{ matrix.pkgarch }}/opera-proxy*.${{ steps.detect.outputs.pkg_ext }}
            openwrt/bin/packages/*/*/opera-proxy*.${{ steps.detect.outputs.pkg_ext }}   # на случай другой структуры
          if-no-files-found: warn

      - name: Debug - list built packages (on failure or always)
        if: always()
        run: |
          find openwrt/bin/packages -type f -name "opera-proxy*" -print || true
          ls -la openwrt/bin/packages/*/ || true
